<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Video - YOUFLIX</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #e50914;
            --bg-dark: #0f0f0f;
            --text-main: #ffffff;
            --text-dim: #b3b3b3;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            overflow-x: hidden;
        }

        /* Header */
        header {
            padding: 20px 4%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }

        .logo {
            color: var(--primary);
            font-size: 24px;
            font-weight: 900;
            text-decoration: none;
            letter-spacing: -1px;
        }

        /* Video Section */
        .video-container {
            width: 100%;
            background: #000;
            aspect-ratio: 16 / 9;
            max-height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 0;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Content Info */
        .content-main {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 4%;
        }

        .video-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 12px;
            line-height: 1.3;
        }

        .meta-info {
            display: flex;
            gap: 20px;
            color: var(--text-dim);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .description-box {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            line-height: 1.8;
            color: #ddd;
            backdrop-filter: blur(10px);
        }

        /* Buttons */
        .action-bar {
            display: flex;
            gap: 15px;
            margin: 30px 0;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s ease;
            text-decoration: none;
        }

        .btn-back {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-back:hover { background: rgba(255,255,255,0.2); }

        .btn-yt {
            background: var(--primary);
            color: white;
            border: none;
        }

        .btn-yt:hover { background: #ff0f1a; transform: translateY(-2px); }

        @media (max-width: 768px) {
            .video-title { font-size: 24px; }
            header { padding: 15px 5%; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">YOUFLIX</a>
        <div class="user-actions">
            <a href="index.html" class="btn btn-back" style="padding: 8px 16px; font-size: 13px;">
                <i class="fas fa-arrow-left"></i> 목록으로
            </a>
        </div>
    </header>

    <div class="video-container">
        <!-- Demo Youtube Embed: TV문학관 '건너야 할 강' -->
        <iframe src="https://www.youtube.com/embed/S2M8R2p5P9Q?autoplay=1&rel=0&showinfo=0&origin=https://www.youflix.kr" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen></iframe>
    </div>

    <main class="content-main">
        <h1 class="video-title">[TV문학관] 건너야 할 강 (The River of No Return)</h1>
        
        <div class="meta-info">
            <span><i class="fas fa-calendar-alt"></i> 1980년대 Classic</span>
            <span><i class="fas fa-eye"></i> Premium Archive</span>
        </div>

        <div class="action-bar">
            <a href="https://youtu.be/S2M8R2p5P9Q" target="_blank" class="btn btn-yt">
                <i class="fab fa-youtube"></i> YouTube에서 직접 보기
            </a>
        </div>

        <div class="description-box">
            <strong>[작품 소개]</strong><br>
            이 작품은 한국 문학의 깊은 정서를 TV 드라마로 승화시킨 [TV문학관]의 초기 명작입니다. <br><br>
            운명과 인연, 그리고 인간의 근원적인 고독을 다룬 이 에피소드는 당시 최고 수준의 연출력과 연기력을 보여주며 많은 시청자들에게 감동을 선사했습니다. 유플릭스에서 복원된 최고 화질의 아카이브로 한국 고전 드라마의 정수를 느껴보세요.
        </div>
    </main>

</body>
</html>
