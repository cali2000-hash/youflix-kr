<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOUFLIX | ADMIN CENTER</title>
    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --admin-primary: #e50914; --admin-bg: #0b0b0b; --card-bg: #1a1a1a; }
        body { background-color: var(--admin-bg); color: #fff; font-family: 'Inter', 'Noto Sans KR', sans-serif; margin: 0; padding: 0; }
        .admin-header { padding: 40px 4%; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); border-bottom: 2px solid var(--admin-primary); }
        .admin-header h1 { margin: 0; font-size: 2.5rem; font-weight: 900; color: var(--admin-primary); letter-spacing: 2px; }
        .admin-container { padding: 40px 4%; display: grid; grid-template-columns: 350px 1fr; gap: 40px; }
        
        .add-card { background: var(--card-bg); padding: 30px; border-radius: 12px; border: 1px solid #333; position: sticky; top: 40px; height: fit-content; }
        .add-card h2 { margin-top: 0; color: #fff; font-size: 1.5rem; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #aaa; }
        .form-group input, .form-group select { width: 100%; padding: 12px; background: #262626; border: 1px solid #444; border-radius: 6px; color: #fff; font-size: 1rem; box-sizing: border-box; }
        .form-group input:focus { border-color: var(--admin-primary); outline: none; }
        
        .btn-add { background: var(--admin-primary); color: #fff; border: none; padding: 15px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 1rem; transition: transform 0.2s; }
        .btn-add:hover { transform: scale(1.02); filter: brightness(1.1); }
        
        .preview-box { margin-top: 20px; border-radius: 8px; overflow: hidden; background: #000; display: none; }
        .preview-box img { width: 100%; display: block; }
        
        .list-section { background: var(--card-bg); padding: 30px; border-radius: 12px; border: 1px solid #333; }
        .list-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .list-controls h2 { margin: 0; }
        
        .admin-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .admin-table th { text-align: left; background: #262626; padding: 15px; color: #aaa; font-weight: normal; font-size: 0.85rem; text-transform: uppercase; }
        .admin-table td { padding: 15px; border-bottom: 1px solid #333; }
        .admin-table tr:hover { background: rgba(255,255,255,0.05); }
        
        .thumb-mini { width: 80px; height: 45px; border-radius: 4px; object-fit: cover; }
        .btn-del { background: transparent; border: 1px solid #e50914; color: #e50914; padding: 6px 12px; border-radius: 4px; cursor: pointer; transition: 0.2s; font-size: 0.85rem; }
        .btn-del:hover { background: #e50914; color: white; }
        
        #loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 10000; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 50px; height: 50px; border: 5px solid #333; border-top-color: var(--admin-primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <div class="spinner"></div>
        <p style="margin-top:20px; font-weight:bold;">Processing Archive...</p>
    </div>

    <header class="admin-header">
        <h1>YOUFLIX.KR <span style="font-size: 1rem; color: #fff; vertical-align: middle; margin-left: 20px; opacity: 0.6;">ADMIN DASHBOARD v1.0</span></h1>
    </header>

    <div class="admin-container">
        <!-- Add Section -->
        <aside class="add-card">
            <h2>Add New Release</h2>
            <div class="form-group">
                <label>YouTube Link or Video ID</label>
                <input type="text" id="yt-input" placeholder="https://www.youtube.com/watch?v=..." oninput="parseVideo()">
            </div>
            
            <div class="preview-box" id="preview-box">
                <img id="preview-img" src="">
                <div id="preview-info" style="padding:10px; font-size:0.85rem; color:#aaa;"></div>
            </div>

            <div class="form-group">
                <label>Category</label>
                <select id="category-select">
                    <option value="trending">Trending Now</option>
                    <option value="kpop">K-Pop Hits</option>
                    <option value="kdrama">K-Drama Originals</option>
                    <option value="kclassic">Legacy Cinema</option>
                    <option value="kmovie">Latest Films</option>
                    <option value="kvariety">Variety Specials</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Custom Title (Optional)</label>
                <input type="text" id="custom-title" placeholder="Auto-fetched if empty">
            </div>

            <button class="btn-add" onclick="pushToArchive()">🚀 PUSH TO ARCHIVE</button>
        </aside>

        <!-- List Section -->
        <main class="list-section">
            <div class="list-controls">
                <h2>Active Archive</h2>
                <select id="filter-select" onchange="loadList()" style="width:200px; padding:10px; background:#262626; border:1px solid #444; color:#fff; border-radius:6px;">
                    <option value="kpop">K-Pop</option>
                    <option value="kdrama">K-Drama</option>
                    <option value="kclassic">Classic</option>
                    <option value="kmovie">Movies</option>
                    <option value="kvariety">Variety</option>
                    <option value="trending">Trending</option>
                </select>
            </div>

            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Video</th>
                        <th>Title</th>
                        <th>Category</th>
                        <th>Date</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="archive-list">
                    <!-- Dynamic -->
                </tbody>
            </table>
        </main>
    </div>

    <script src="admin.js"></script>
</body>
</html>
