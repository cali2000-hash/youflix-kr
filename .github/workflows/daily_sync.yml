name: YOUFLIX Daily Midnight Sync

on:
  schedule:
    - cron: '0 15 * * *' # 매일 한국 시간 00:00 (UTC 15:00)
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install -r engine/requirements.txt

      - name: Run Archive Sync
        env:
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }} # 보안을 위해 개별 키 설정 가능
        run: |
          python engine/updater.py
